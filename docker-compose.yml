version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: daystrom_postgres
    environment:
      POSTGRES_USER: daystrom
      POSTGRES_PASSWORD: daystrom_dev_password
      POSTGRES_DB: daystrom_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daystrom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis for caching (future enhancement)
  # redis:
  #   image: redis:7-alpine
  #   container_name: daystrom_redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
  # redis_data:

